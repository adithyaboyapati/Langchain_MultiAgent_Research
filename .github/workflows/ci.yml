# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  CI Pipeline — LangChain Multi-Agent Research System                       ║
# ║                                                                            ║
# ║  This workflow runs on every push/PR to main:                              ║
# ║    1. Lint & Format  → catch code issues early                             ║
# ║    2. Test           → run unit tests with coverage                        ║
# ║    3. Docker Build   → verify the container builds successfully            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CI Pipeline

# ── When to run ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Environment variables shared across all jobs ─────────────────────────────
env:
  PYTHON_VERSION: "3.11"

jobs:
  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  Job 1: Lint & Format Check                                            │
  # │  Purpose: Catch code style issues before tests even run                │
  # └──────────────────────────────────────────────────────────────────────────┘
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff linter
        run: |
          echo "🔍 Checking for code issues..."
          ruff check . --output-format=github

      - name: Check code formatting
        run: |
          echo "🎨 Verifying code formatting..."
          ruff format --check .

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  Job 2: Run Tests                                                      │
  # │  Purpose: Verify all unit tests pass and measure code coverage         │
  # └──────────────────────────────────────────────────────────────────────────┘
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint  # Only run tests if linting passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Set dummy env vars so modules can import without crashing
      - name: Set test environment variables
        run: |
          echo "OPENAI_API_KEY=test-dummy-key" >> $GITHUB_ENV
          echo "TAVILY_API_KEY=test-dummy-key" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          echo "🧪 Running test suite..."
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  Job 3: Docker Build                                                   │
  # │  Purpose: Verify the Docker image builds successfully                  │
  # └──────────────────────────────────────────────────────────────────────────┘
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test  # Only build Docker if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build \
            --tag research-agent:${{ github.sha }} \
            --tag research-agent:latest \
            .

      - name: Verify image was created
        run: |
          echo "✅ Verifying Docker image..."
          docker images research-agent
          echo ""
          echo "Image size:"
          docker images research-agent:latest --format "{{.Size}}"
